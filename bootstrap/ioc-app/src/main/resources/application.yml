# ============================================================================
#  ioc-extractor — default configuration
#  All source/sink/policy specifics live here (and in external override files),
#  never hard-coded in the domain. Override order:
#     classpath:application.yml  <  ./configs/*.yml  <  CLI flags / env vars
# ============================================================================
spring:
  main:
    # Non-web by default (CLI/oneshot). In daemon mode this is flipped to 'servlet'
    # by DaemonWebEnvironmentPostProcessor to expose the actuator/health surface.
    web-application-type: none
    banner-mode: "off"
  profiles:
    # Logback appenders are selected by Spring profile. Keep that profile aligned
    # with the public observability mode knob, so `ioc.observability.mode=daemon`
    # enables daemon ECS file logging as well.
    active: ${ioc.observability.mode:oneshot}
  config:
    # External, user-editable overrides (optional files).
    import: "optional:file:./configs/application.yml"

logging:
  level:
    root: INFO
    com.iocextractor: INFO
  file:
    path: var/logs

# HTTP surface — only active in daemon mode (web is non-web otherwise). Bound to
# loopback by default; exposes health/info for ops. No 'shutdown' endpoint. This
# is also the seam for future REST endpoints (ING-8).
server:
  address: 127.0.0.1
  port: 8081
  # Tiny pool: this server only serves /actuator/** (health/info). Tomcat's default
  # of 200 worker threads would waste threads/memory and push against the systemd
  # TasksMax / MemoryMax limits.
  tomcat:
    threads:
      max: 8
      min-spare: 1
    accept-count: 10
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      # Full component details (including local paths/counts) are returned, and the
      # `ioc health` table relies on them. This is safe ONLY because the server binds
      # loopback (server.address above). REVISIT for ING-8: once the web surface is
      # exposed beyond loopback, gate this behind auth or switch to
      # `when-authorized`/`never` so internal paths are not leaked unauthenticated.
      show-details: always

ioc:
  runtime:
    mode: oneshot

  # ---- Storage topology ------------------------------------------------------
  # Storage-neutral selectors live at the role level. Backend-specific tuning is
  # nested under that backend so future Postgres/Redis settings do not pollute
  # the common shape. The service datasource is created only in daemon mode when
  # ioc.ingestion.ledger.type=jdbc. The dataframe datasource is the business-data
  # source of truth; configured CSV files are generated projections.
  storage:
    service:
      type: jdbc
      url: "jdbc:sqlite:./var/ioc-service.db"
      sqlite:
        tuning: low-memory
      pool:
        write-max: 1
        read-max: 2
    dataframe:
      type: jdbc
      url: "jdbc:sqlite:./dataframe/ioc-dataframe.db"
      sqlite:
        tuning: low-memory
      pool:
        write-max: 1
        read-max: 2

  observability:
    mode: oneshot
    per-item-trace-enabled: false

  # ---- Source profile: how to read & where indicators come from --------------
  source:
    type: auto                       # 'auto' = Tika detects format (.docx/.htm/.pdf/...)
    # Input charset (boundary 1). 'auto' = Tika/ICU detection. An explicit name
    # FORCES decoding of text/HTML sources (use for legacy cp1251 Word exports
    # that auto-detect wrongly); docx/pdf ignore it (POI/PDFBox own their encoding).
    charset: auto
    # Section headers that set the `source` attribution for following indicators.
    section-markers:
      - "БИБ-\\d+"
      - "Письмо ФСТЭК России[^№]*№\\s*[\\d/]+"

  # ---- Deobfuscation (refang) rules: ordered, applied left-to-right -----------
  refang:
    rules:
      - { from: "hxxps", to: "https" }
      - { from: "hxxp",  to: "http"  }
      - { from: "[.]",   to: "."     }
      - { from: "[:]",   to: ":"     }
      - { from: "(dot)", to: "."     }
      - { from: "[at]",  to: "@"     }

  # ---- Regex engine: 're2j' (linear-time, default) or 'jdk' (java.util.regex).
  #  Patterns below use \b boundaries only, so they are valid in BOTH engines
  #  (RE2 has no lookaround/backreferences).
  engine: re2j

  # ---- Indicator detection: type -> regex (applied to refanged text) ---------
  #  Order = priority. URL/IP win over DOMAIN when spans overlap (the host of a
  #  URL must not be re-emitted as a bare domain) — resolved by the extractor.
  patterns:
    SHA256: "\\b[0-9a-fA-F]{64}\\b"
    SHA1:   "\\b[0-9a-fA-F]{40}\\b"
    MD5:    "\\b[0-9a-fA-F]{32}\\b"
    URL:    "https?://[^\\s;,<>\"']+"
    IPV4:   "\\b(?:\\d{1,3}\\.){3}\\d{1,3}(?:[:/][^\\s;,<>\"']*)?"
    DOMAIN: "\\b(?:[a-zA-Z0-9-]+\\.)+[a-zA-Z]{2,}(?:/[^\\s;,<>\"']*)?"

  # ---- Mask classification: declarative rules over indicator features --------
  #  First-match-wins. Authoritative 4-variant scheme; tune rules/codes here,
  #  not in code. Predicate keys come from the domain FeaturePredicates registry.
  classify:
    rules:
      - { when: [ has-query ],        url-match: "u:hAS,pEX", host-match: null }   # variant 4: URL with params
      - { when: [ has-path-or-port ], url-match: "u:hEX,dEX", host-match: null }   # variant 3: host with path/port
      - { when: [ is-subdomain ],     url-match: "u:hEX",     host-match: "h:dEX" } # variant 2: exact subdomain
      - { when: [],                   url-match: "u:hAS",     host-match: "h:dAS" } # variant 1: registrable/IP/onion

  # ---- Output artifacts (sinks) ----------------------------------------------
  #  Each artifact has its OWN schema (columns), id-sequence and normalization.
  #  Filling is declarative: `columns` use named value providers + transforms.
  #  Add a new artifact = add an entry here (no code); routed by `accepts` type.
  sink:
    csv:
      delimiter: ";"
      quote: "\""
      null-literal: "NULL"
      # Output charset (boundary 2) for ALL artifacts, and for reading existing
      # artifacts in lookup/aggregation (read and write always agree). Unmappable
      # characters are replaced, never fatal. Blank = UTF-8.
      charset: UTF-8
    artifacts:
      - name: masks                  # network IOC -> reputation-list masks
        enabled: true
        path: "./dataframe/masks_list_generated.csv"
        accepts: [ IPV4, DOMAIN, URL ]
        exclude: [ is-bare-ip ]
        id: { strategy: ascending, start: auto }   # ascending; 'auto' = lookup max + 1
        columns:
          - { name: id,              from: id }
          - { name: mask,            from: value, transform: [ lower-host ] }
          - { name: url_match,       from: match.url }
          - { name: host_match,      from: match.host }
          - { name: score,           from: const, type: INTEGER }
          - { name: time_last_seen,  from: const }
          - { name: time_first_seen, from: const }
          - { name: threat_type,     from: const }
          - { name: source,          from: source.label }
          - { name: description,     from: const }
      - name: ip_list                # bare IP IOC -> IP reputation list
        enabled: true
        path: "./dataframe/ip_list_generated.csv"
        accepts: [ IPV4 ]
        include: [ is-bare-ip ]
        id: { strategy: ascending, start: auto }
        columns:
          - { name: id,              from: id }
          - { name: ip,              from: value }
          - { name: score,           from: const, type: INTEGER }
          - { name: time_last_seen,  from: const }
          - { name: time_first_seen, from: const }
          - { name: threat_type,     from: const }
          - { name: source,          from: source.label, transform: [ "strip-prefix:Письмо " ] }
          - { name: description,     from: const }
      - name: address_blacklist      # simple URL/IP-host address blacklist
        enabled: true
        path: "./dataframe/address_blacklist_generated.csv"
        accepts: [ IPV4, DOMAIN, URL ]
        # bare IP -> forbidden_ip; everything else (domains, URLs, IP-URLs) -> forbidden_url
        columns:
          - { name: forbidden_url,   from: address.url, transform: [ lower-host ] }
          - { name: forbidden_ip,    from: address.ip,  transform: [ lower-host ] }
      - name: hashes                 # file IOC -> hash list (separate schema)
        enabled: true
        path: "./dataframe/hashes_list_generated.csv"
        accepts: [ MD5, SHA1, SHA256 ]
        id: { strategy: ascending, start: auto }
        columns:
          - { name: id,              from: id }
          - { name: hash_md5,        from: value, when-type: MD5,    transform: [ upper ] }
          - { name: hash_sha256,     from: value, when-type: SHA256, transform: [ upper ] }
          - { name: hash_sha1,       from: value, when-type: SHA1,   transform: [ upper ] }
          - { name: score,           from: const, type: INTEGER }
          - { name: time_last_seen,  from: const }
          - { name: time_first_seen, from: const }
          - { name: threat_type,     from: const }
          - { name: source,          from: source.label, transform: [ "strip-prefix:Письмо " ] }
          - { name: description,     from: const }

  # ---- Lookup repository (dedup / cross-checks against existing artifact) -----
  lookup:
    type: csv
    path: "./dataframe/masks_list.csv"
    deduplicate: true
    artifacts:
      - { name: masks,   path: "./dataframe/masks_list.csv" }
      - { name: ip_list, path: "./dataframe/ip_list.csv" }
      - { name: hashes,  path: "./dataframe/hashes_list.csv" }

  # ---- Daemon aggregation (stage 11; active in daemon mode when enabled) ----
  aggregation:
    enabled: true
    # When to aggregate partitions into canonical artifacts:
    #   interval     — periodic timer only
    #   on-partition — event-driven: aggregate right after each ingest produces a partition
    #   both         — event kick + timer as a safety net (default)
    trigger: both
    interval: 1m
    initial-delay: 10s
    id-index:
      path: "./dataframe/.ioc-id-index.csv"
    artifacts:
      - name: masks
        key-columns: [ mask ]
        conflict-policy: keep-first
      - name: ip_list
        key-columns: [ ip ]
        conflict-policy: keep-first
      - name: address_blacklist
        key-columns: [ forbidden_url, forbidden_ip ]
        key-mode: first-non-empty
        conflict-policy: keep-first
      - name: hashes
        key-columns: [ hash_md5, hash_sha1, hash_sha256 ]
        key-mode: first-non-empty
        conflict-policy: keep-first

  # ---- Daemon housekeeping: retention reaper (active in daemon mode when enabled)
  #  One declarative policy reaps aged/over-count entries from growing dirs.
  #  max-age: ISO-8601 / Spring duration (e.g. 14d, 720h); max-count: 0 = disabled.
  #  action: delete | archive (archive needs archive-dir).
  #  An entry is reaped if older than max-age OR beyond the max-count newest.
  #  NOTE: entries are individual leaf files, reaped recursively. So for the nested
  #  partitions tree max-count pools all artifact/day files together (coarse) — prefer
  #  max-age there; max-count fits the flat done/failed dirs. Per-group count lands
  #  with the storage rework (ING-4), where retention becomes a query.
  maintenance:
    retention:
      enabled: false
      interval: 1h
      initial-delay: 5m
      targets:
        - { name: partitions, dir: "./dataframe/partitions", max-age: 14d, max-count: 0, action: delete }
        - { name: done,       dir: "./var/done",   max-age: 30d, max-count: 0, action: delete }
        - { name: failed,     dir: "./var/failed", max-age: 90d, max-count: 0, action: delete }

  # ---- Daemon ingestion (disabled unless ioc.runtime.mode=daemon) ------------
  ingestion:
    dirs:
      inbox: "./var/inbox"
      processing: "./var/processing"
      done: "./var/done"
      failed: "./var/failed"
    patterns:
      include: [ "*.htm", "*.html", "*.docx" ]
      exclude: [ "*.tmp", "*.part", ".*" ]
    detect:
      use-watch-service: true
      reconcile-interval: 30s
      max-messages-per-poll: 50
    stability:
      quiet-period: 10s
    output:
      partitions-dir: "./dataframe/partitions"
    retry:
      max-attempts: 3
      backoff: 5s
    ledger:
      type: file
      path: "./var/ledger"
    concurrency: 1
