name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# A new push to the same ref cancels the in-progress run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Single gate: the reactor build runs ArchUnit + Enforcer + golden e2e.
      # Module boundaries are enforced inside the build, not by extra CI steps.
      - name: Build, test & verify boundaries
        run: ./mvnw -B -ntp -T 1C verify
