# ============================================================================
#  ioc-extractor — operator override (production daemon)
#
#  Loaded via:  --spring.config.additional-location=optional:file:./etc/application.yml
#  WorkingDirectory is the install prefix, so all relative paths below resolve
#  under it (e.g. ./var/inbox -> <prefix>/var/inbox).
#
#  This file only OVERRIDES the packaged defaults (in the jar). Everything not
#  set here keeps its built-in value. Edit and `systemctl restart ioc-extractor`.
# ============================================================================
spring:
  profiles:
    active: daemon          # activates the daemon logback profile / ECS file appender

logging:
  file:
    path: var/logs          # rolling ECS-JSON log under <prefix>/var/logs

ioc:
  runtime:
    mode: daemon            # also forced on the command line by the systemd unit
  observability:
    mode: daemon            # ECS logging tuned for a long-running process
  # Keep durable SQLite state separate from CSV references/projections. SQLite
  # creates WAL/SHM sidecars next to each DB, so var/db is the backup unit.
  storage:
    service:
      url: "jdbc:sqlite:./var/db/ioc-service.db"
    dataframe:
      url: "jdbc:sqlite:./var/db/ioc-dataframe.db"

